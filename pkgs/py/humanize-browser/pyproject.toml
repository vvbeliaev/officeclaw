[project]
name = "humanize-browser"
version = "0.1.0"
description = "Human-like browser automation CLI with Camoufox stealth and behaviour middleware"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "camoufox[geoip]>=0.4.11",
    "fastapi>=0.115.0",
    "httpx>=0.28.0",
    "playwright>=1.58.0",
    "playwright-stealth>=2.0.2",
    "uvicorn>=0.34.0",
]

[project.scripts]
humanize-browser = "humanize_browser.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.25.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = ["integration: requires a real browser (slow)"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]
