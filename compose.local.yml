services:
  registry:
    image: registry:2
    ports:
      - "5005:5000"
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg18
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file: api/.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "3000:3000"
    env_file: web/.env
    depends_on:
      - api
    restart: unless-stopped
