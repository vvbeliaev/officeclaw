services:
  registry:
    image: registry:2
    ports:
      - "5005:5000"
    restart: unless-stopped

  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    command:
      - postgres
      - -c
      - shared_preload_libraries=age
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: officeclaw
    volumes:
      - ./db/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d officeclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  docling:
    image: ghcr.io/docling-project/docling-serve-cpu:latest
    ports:
      - "5001:5001"
    restart: unless-stopped

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./minio:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 2 &&
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/officeclaw &&
        mc anonymous set public local/officeclaw
      "
    restart: on-failure

  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file: api/.env
    environment:
      SANDBOX_RUNNER: docker
      SANDBOX_GATEWAY_HOST: host.docker.internal
      DOCLING_URL: http://docling:5001
      STORAGE_ENDPOINT: http://minio:9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "3000:3000"
    env_file: web/.env
    depends_on:
      - api
    restart: unless-stopped
